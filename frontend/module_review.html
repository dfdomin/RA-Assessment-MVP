<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>Revisión de módulo — RA Assessment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/main.css?v=BUILD_SHA" />
</head>
<body class="dashboard-layout module-review-page">

  <header class="site-header site-header--assessment" role="banner">
    <div class="assessment-header-bar">
      <div class="assessment-header-brand">
        <svg
          class="logo"
          viewBox="0 0 120 40"
          aria-label="Institución Universitaria de Barranquilla"
          role="img"
          focusable="false"
        >
          <rect width="120" height="40" fill="#FFDF2D" rx="4" />
          <text x="8" y="26" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#1E2843">IUB</text>
        </svg>
        <h1>Revisión de módulo</h1>
      </div>
      <div class="assessment-header-context">
        <a class="back-link back-link--header" href="./dashboard.html">Volver al panel</a>
      </div>
    </div>
  </header>

  <p id="review-status-banner" class="module-review-banner" role="status" hidden></p>

  <main class="module-review-main">
    <section id="review-summary" class="module-review-card" aria-labelledby="review-summary-title">
      <h2 id="review-summary-title">Resumen del módulo</h2>
      <dl class="module-review-meta" id="review-summary-body"></dl>
    </section>

    <section id="review-weights" class="module-review-card" aria-labelledby="review-weights-title">
      <h2 id="review-weights-title">Ponderaciones por indicador</h2>
      <div id="review-weights-body"></div>
    </section>

    <section id="review-roster" class="module-review-card" aria-labelledby="review-roster-title">
      <h2 id="review-roster-title">Lista de estudiantes</h2>
      <div id="review-roster-body"></div>
    </section>

    <section id="review-grades" class="module-review-card" aria-labelledby="review-grades-title">
      <h2 id="review-grades-title">Calificaciones por indicador</h2>
      <div id="review-grades-body"></div>
    </section>

    <section id="review-analysis" class="module-review-card" aria-labelledby="review-analysis-title">
      <h2 id="review-analysis-title">Análisis del docente</h2>
      <div id="review-analysis-body"></div>
    </section>

    <p id="review-status" class="status-message" role="status" aria-live="polite">Cargando…</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-client.js?v=BUILD_SHA"></script>
  <script src="./js/module_review.js?v=BUILD_SHA"></script>
</body>
</html>

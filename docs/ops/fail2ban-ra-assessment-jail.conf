# Copy to /etc/fail2ban/jail.d/ra-assessment.conf
# Requires the RA Assessment security logger to write JSONL to this logpath.

[ra-assessment]
enabled = true
filter = ra-assessment
logpath = /var/log/ra-assessment/security.jsonl
maxretry = 5
findtime = 60
bantime = 3600
backend = auto
action = ufw[name=ra-assessment]

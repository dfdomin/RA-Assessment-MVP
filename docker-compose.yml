services:
  db:
    image: postgres:16-alpine
    container_name: ra_postgres
    environment:
      POSTGRES_DB: ra_test
      POSTGRES_USER: ra
      POSTGRES_PASSWORD: local_only
    ports:
      - "5432:5432"
    volumes:
      - ra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ra -d ra_test"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  ra_pgdata:

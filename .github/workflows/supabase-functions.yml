name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy report-abet --project-ref whjjervbojyktkhvvmte
          supabase functions deploy report-leader --project-ref whjjervbojyktkhvvmte
          supabase functions deploy sanitize --project-ref whjjervbojyktkhvvmte
          supabase functions deploy bulk-import --project-ref whjjervbojyktkhvvmte
          supabase functions deploy students-import --project-ref whjjervbojyktkhvvmte
          supabase functions deploy habeas-data --project-ref whjjervbojyktkhvvmte
